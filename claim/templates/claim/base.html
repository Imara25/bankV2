<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Authentication</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Small custom style -->
    <style>
      body {
        background: #f4f6f9;
      }

      .navbar-custom {
        background: linear-gradient(90deg, #0d6efd, #6610f2);
      }

      .nav-link {
        color: white !important;
        font-weight: 500;
      }

      .nav-link:hover {
        text-decoration: underline;
      }

      .card-box {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      }
    </style>

  </head>

  <body>

    {% block navbar %}
    <div><br></div>
    <div class="navbar-custom text-white p-3 shadow">
      <div class="container d-flex justify-content-between align-items-center">

        <a href="{% url 'index' %}" class="nav-link d-inline me-3" class="m-0">Authora</a>

        <div>
          <a href="{% url 'login' %}" class="nav-link d-inline me-3">Login</a>
          <a href="{% url 'register' %}" class="nav-link d-inline">Register</a>
        </div>

      </div>
    </div>
    {% endblock navbar %}

    <!-- Content -->
    <div class="container mt-5">

      <div class="card-box">
        {% block content %}
        {% endblock content %}
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

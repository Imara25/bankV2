{% extends 'claim/base.html' %}


{% block content %}
    <center><h1>Login</h1></center>
    
    {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endif %}
        
    <form method="POST" action='{% url "login" %}'>
        {% csrf_token %}
   
     <div class="mb-3">
        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter your username" name="username" required>
    </div>
    <div class="mb-3">
        <input type="password" name="password" class="form-control" id="exampleInputPassword1" placeholder="Confirm your Password" required>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    </form>
{% endblock content %}
